# Drop this into a hardware repo at .github/workflows/pcb-gate.yml
# to run the Kitium Altium->KiCad validation gate on every pull request.
name: PCB Gate
on:
  pull_request:
    paths:
      - "**/*.PcbDoc"
      - "**/*.SchDoc"
      - "**/*.PrjPcb"

permissions:
  contents: read
  pull-requests: write   # for the sticky PR comment

jobs:
  kitium:
    runs-on: ubuntu-latest
    steps:
      # If your repo tracks the Altium binaries in Git LFS, you MUST materialize
      # them — a plain checkout leaves pointer files that kicad-cli can't read.
      # action-cached-lfs-checkout caches LFS objects so warm runs don't burn the
      # 10 GiB/mo LFS bandwidth quota. For non-LFS repos, a normal checkout is fine.
      # Actions are SHA-pinned (audit any third-party action before adopting, then
      # pin by full commit SHA so a re-tagged release can't change CI behavior).
      - uses: nschloe/action-cached-lfs-checkout@385a8ecc719e50b8c71af6ab01a624b486b7c3bc # v1.2.5
        with:
          fetch-depth: 0          # visual diff needs git history
      # Non-LFS alternative:
      # - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      #   with: { fetch-depth: 0 }

      - name: Run Kitium
        uses: Cimos/kitium@v0.1.0      # first published release; pin a concrete tag for reproducibility
        with:
          # Auto-detected if omitted; set explicitly when layout varies:
          project: hardware/MyBoard.PrjPcb
          bom_csv: hardware/MyBoard_BOM.csv   # exported by your Altium OutputJob
          drc: report                          # report | block
          github_token: ${{ secrets.GITHUB_TOKEN }}   # required for the sticky PR comment

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kitium-out
          path: kitium-out/
